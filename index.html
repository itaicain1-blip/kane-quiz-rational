<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>איך הופכים 200,000 ש"ח לדירה ראשונה להשקעה? | קיין יזמות נדל"ן</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700;800&family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    /* === צבעי ברנד קיין === */
    --navy-deep: #1A1B5C;          /* כחול-סגול עמוק - רקע ראשי */
    --navy-mid: #2D2E7A;            /* גוון בינוני */
    --navy-light: #3F40A0;          /* גוון בהיר יותר */
    --teal: #14B8A6;                /* טורקיז ראשי */
    --teal-bright: #2DD4BF;         /* טורקיז זוהר */
    --teal-dark: #0D9488;           /* טורקיז כהה */
    --purple-light: #A78BFA;        /* סגול בהיר - כפתורים */
    --purple-mid: #8B5CF6;          /* סגול בינוני */
    --purple-soft: #C4B5FD;         /* סגול עדין */

    --white: #FFFFFF;
    --cream: #FAF9FF;
    --gray-100: #F3F4F6;
    --gray-300: #D1D5DB;
    --gray-500: #6B7280;
    --gray-700: #374151;
    --green: #10B981;
    --red: #EF4444;

    --shadow-sm: 0 4px 12px rgba(26, 27, 92, 0.08);
    --shadow-md: 0 10px 30px rgba(26, 27, 92, 0.12);
    --shadow-lg: 0 25px 60px rgba(26, 27, 92, 0.18);
    --shadow-glow: 0 10px 40px rgba(20, 184, 166, 0.3);
    --shadow-purple: 0 10px 40px rgba(167, 139, 250, 0.4);
  }

  html, body { overflow-x: hidden; }

  body {
    font-family: 'Assistant', sans-serif;
    background: var(--navy-deep);
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(63, 64, 160, 0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(20, 184, 166, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
    background-attachment: fixed;
    min-height: 100vh;
    color: var(--white);
    line-height: 1.6;
    position: relative;
  }

  /* רקע גיאומטרי דקורטיבי */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(45deg, transparent 48%, rgba(255,255,255,0.02) 49%, rgba(255,255,255,0.02) 51%, transparent 52%),
      linear-gradient(-45deg, transparent 48%, rgba(255,255,255,0.02) 49%, rgba(255,255,255,0.02) 51%, transparent 52%);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  /* צורות צפות */
  .floating-shape {
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }
  .shape-1 {
    top: 10%;
    left: -50px;
    width: 200px;
    height: 200px;
    background: linear-gradient(135deg, var(--purple-light) 0%, var(--purple-mid) 100%);
    border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
    filter: blur(40px);
    animation: float-1 20s ease-in-out infinite;
  }
  .shape-2 {
    bottom: 15%;
    right: -80px;
    width: 280px;
    height: 280px;
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-bright) 100%);
    border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
    filter: blur(60px);
    animation: float-2 25s ease-in-out infinite;
  }
  .shape-3 {
    top: 50%;
    left: 50%;
    width: 150px;
    height: 150px;
    background: var(--purple-soft);
    transform: translate(-50%, -50%) rotate(45deg);
    filter: blur(50px);
    opacity: 0.3;
    animation: float-3 30s ease-in-out infinite;
  }

  @keyframes float-1 {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(30px, 50px) rotate(180deg); }
  }
  @keyframes float-2 {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    50% { transform: translate(-50px, -30px) rotate(-180deg); }
  }
  @keyframes float-3 {
    0%, 100% { transform: translate(-50%, -50%) rotate(45deg); }
    50% { transform: translate(-30%, -70%) rotate(225deg); }
  }

  .container {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  /* === Logo === */
  .logo-bar {
    text-align: center;
    padding: 16px 0 28px;
  }
  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    font-weight: 800;
    font-size: 22px;
    color: var(--white);
    letter-spacing: -0.5px;
  }
  .logo-icon {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-bright) 100%);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--navy-deep);
    font-weight: 900;
    font-size: 24px;
    box-shadow: var(--shadow-glow), inset 0 -3px 8px rgba(0,0,0,0.2);
    transform: rotate(-5deg);
    transition: transform 0.3s ease;
  }
  .logo:hover .logo-icon {
    transform: rotate(0deg) scale(1.05);
  }

  /* === Card === */
  .card {
    background: rgba(255, 255, 255, 0.98);
    backdrop-filter: blur(20px);
    border-radius: 28px;
    padding: 44px;
    box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255, 255, 255, 0.1);
    color: var(--gray-700);
    animation: cardEntry 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--teal) 0%, var(--purple-light) 50%, var(--teal-bright) 100%);
  }

  @keyframes cardEntry {
    from { opacity: 0; transform: translateY(30px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* === מסך פתיחה === */
  .welcome { text-align: center; }
  .welcome-eyebrow {
    display: inline-block;
    color: var(--teal-dark);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 2px;
    margin-bottom: 16px;
    text-transform: uppercase;
    font-family: 'Heebo', sans-serif;
  }
  .welcome h1 {
    font-family: 'Heebo', sans-serif;
    font-size: 42px;
    font-weight: 900;
    line-height: 1.15;
    margin-bottom: 18px;
    color: var(--navy-deep);
    letter-spacing: -1px;
  }
  .welcome h1 .highlight {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-bright) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    position: relative;
    display: inline-block;
  }
  .welcome h1 .highlight::after {
    content: "";
    position: absolute;
    bottom: 4px;
    left: 0;
    right: 0;
    height: 8px;
    background: var(--teal);
    opacity: 0.15;
    z-index: -1;
    border-radius: 4px;
  }
  .welcome .subtitle {
    font-size: 17px;
    color: var(--gray-500);
    margin-bottom: 32px;
    max-width: 540px;
    margin-left: auto;
    margin-right: auto;
    line-height: 1.6;
  }
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 0;
    margin-bottom: 28px;
    background: linear-gradient(135deg, rgba(20, 184, 166, 0.05) 0%, rgba(167, 139, 250, 0.05) 100%);
    border-radius: 18px;
    border: 1px solid rgba(20, 184, 166, 0.15);
    overflow: hidden;
  }
  .stat {
    text-align: center;
    flex: 1;
    padding: 18px 12px;
    border-left: 1px solid rgba(20, 184, 166, 0.15);
  }
  .stat:last-child { border-left: none; }
  .stat-num {
    font-family: 'Heebo', sans-serif;
    font-size: 26px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--navy-deep) 0%, var(--purple-mid) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .stat-label {
    font-size: 12px;
    color: var(--gray-500);
    margin-top: 6px;
    font-weight: 500;
  }
  .social-proof {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 28px;
    color: var(--gray-500);
    font-size: 14px;
  }
  .avatars { display: flex; }
  .avatar {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--purple-light) 0%, var(--purple-mid) 100%);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
    border: 2px solid white;
    margin-left: -10px;
    box-shadow: 0 2px 8px rgba(139, 92, 246, 0.3);
  }
  .avatar:nth-child(2) { background: linear-gradient(135deg, var(--teal) 0%, var(--teal-bright) 100%); }
  .avatar:nth-child(3) { background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%); }
  .avatar:first-child { margin-left: 0; }

  /* === Buttons === */
  .btn-primary {
    background: linear-gradient(135deg, var(--purple-light) 0%, var(--purple-mid) 100%);
    color: white;
    border: none;
    padding: 18px 48px;
    font-size: 17px;
    font-weight: 700;
    border-radius: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: var(--shadow-purple);
    width: 100%;
    max-width: 380px;
    position: relative;
    overflow: hidden;
  }
  .btn-primary::before {
    content: "";
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.6s ease;
  }
  .btn-primary:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 40px rgba(139, 92, 246, 0.5);
  }
  .btn-primary:hover::before { left: 100%; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-teal {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
    box-shadow: var(--shadow-glow);
  }
  .btn-teal:hover {
    box-shadow: 0 15px 40px rgba(20, 184, 166, 0.5);
  }

  .small-text {
    font-size: 13px;
    color: var(--gray-500);
    margin-top: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  /* === Progress bar === */
  .progress-section { margin-bottom: 36px; }
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    font-size: 13px;
    color: var(--gray-500);
    font-weight: 600;
  }
  .progress-info .step-num { color: var(--navy-deep); font-weight: 700; }
  .progress-info .pct {
    background: linear-gradient(135deg, var(--teal) 0%, var(--purple-light) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 800;
  }
  .progress-bar {
    height: 10px;
    background: var(--gray-100);
    border-radius: 100px;
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal) 0%, var(--purple-light) 100%);
    border-radius: 100px;
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
    position: relative;
    box-shadow: 0 0 12px rgba(20, 184, 166, 0.5);
  }
  .progress-fill::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    background-size: 200% 100%;
    animation: shimmer 2s infinite;
  }

  /* === שאלה === */
  .question-block { animation: cardEntry 0.4s ease; }
  .question-icon {
    font-size: 40px;
    margin-bottom: 14px;
    display: inline-block;
    animation: pulse 2s ease infinite;
  }
  .question-title {
    font-family: 'Heebo', sans-serif;
    font-size: 28px;
    font-weight: 800;
    line-height: 1.3;
    margin-bottom: 10px;
    color: var(--navy-deep);
    letter-spacing: -0.5px;
  }
  .question-hint {
    font-size: 14px;
    color: var(--gray-500);
    margin-bottom: 30px;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 30px;
  }
  .option {
    background: var(--cream);
    border: 2px solid transparent;
    padding: 18px 22px;
    border-radius: 14px;
    cursor: pointer;
    text-align: right;
    font-size: 16px;
    font-weight: 500;
    color: var(--gray-700);
    font-family: inherit;
    transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }
  .option::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(20, 184, 166, 0.06) 0%, rgba(167, 139, 250, 0.06) 100%);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .option:hover {
    background: white;
    border-color: var(--teal);
    transform: translateX(-4px);
    box-shadow: 0 4px 16px rgba(20, 184, 166, 0.15);
  }
  .option:hover::before { opacity: 1; }
  .option.selected {
    background: white;
    border-color: var(--purple-mid);
    color: var(--navy-deep);
    box-shadow: 0 4px 20px rgba(139, 92, 246, 0.25);
  }
  .option.selected::before {
    background: linear-gradient(135deg, rgba(167, 139, 250, 0.1) 0%, rgba(20, 184, 166, 0.05) 100%);
    opacity: 1;
  }
  .option > * { position: relative; z-index: 1; }
  .option-check {
    width: 24px;
    height: 24px;
    border: 2px solid var(--gray-300);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.25s;
  }
  .option.selected .option-check {
    background: linear-gradient(135deg, var(--purple-light) 0%, var(--purple-mid) 100%);
    border-color: var(--purple-mid);
  }
  .option.selected .option-check::after {
    content: "✓";
    color: white;
    font-weight: 800;
    font-size: 14px;
  }

  .nav-buttons {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
  }
  .btn-next {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
    color: white;
    border: none;
    padding: 14px 36px;
    font-size: 15px;
    font-weight: 700;
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.25s;
    box-shadow: var(--shadow-glow);
  }
  .btn-next:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px rgba(20, 184, 166, 0.5);
  }
  .btn-next:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-back {
    background: transparent;
    color: var(--gray-500);
    border: none;
    padding: 12px 20px;
    font-size: 15px;
    cursor: pointer;
    font-family: inherit;
    font-weight: 500;
    transition: color 0.2s;
  }
  .btn-back:hover { color: var(--navy-deep); }

  /* === Loading === */
  .loading-screen { text-align: center; padding: 30px 20px; }
  .loading-icon {
    width: 90px;
    height: 90px;
    margin: 0 auto 32px;
    position: relative;
  }
  .loading-icon::before, .loading-icon::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 4px solid transparent;
  }
  .loading-icon::before {
    border-top-color: var(--teal);
    border-right-color: var(--teal-bright);
    animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
  }
  .loading-icon::after {
    border-bottom-color: var(--purple-light);
    border-left-color: var(--purple-mid);
    animation: spin 1.8s cubic-bezier(0.5, 0, 0.5, 1) infinite reverse;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-screen h2 {
    font-family: 'Heebo', sans-serif;
    font-size: 28px;
    margin-bottom: 28px;
    color: var(--navy-deep);
    font-weight: 800;
  }
  .loading-steps { text-align: right; max-width: 400px; margin: 0 auto 24px; }
  .loading-step {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 0;
    color: var(--gray-500);
    opacity: 0.4;
    transition: all 0.4s ease;
  }
  .loading-step.active { opacity: 1; color: var(--navy-deep); transform: translateX(-4px); }
  .loading-step.done { opacity: 1; color: var(--teal-dark); }
  .loading-step-icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--gray-100);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gray-500);
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
    transition: all 0.4s;
  }
  .loading-step.active .loading-step-icon {
    background: linear-gradient(135deg, var(--purple-light) 0%, var(--purple-mid) 100%);
    color: white;
  }
  .loading-step.done .loading-step-icon {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
    color: white;
  }
  .loading-tip {
    background: linear-gradient(135deg, rgba(20, 184, 166, 0.08) 0%, rgba(167, 139, 250, 0.08) 100%);
    padding: 18px 22px;
    border-radius: 14px;
    font-size: 14px;
    color: var(--navy-deep);
    margin-top: 24px;
    border-right: 4px solid var(--teal);
    text-align: right;
    line-height: 1.6;
  }
  .loading-tip strong { color: var(--purple-mid); }

  /* === Result === */
  .result-header {
    text-align: center;
    padding: 20px 0 30px;
    border-bottom: 2px dashed var(--gray-100);
    margin-bottom: 32px;
    position: relative;
  }
  .result-emoji {
    font-size: 64px;
    margin-bottom: 14px;
    display: inline-block;
    animation: pulse 2s ease infinite;
    filter: drop-shadow(0 8px 24px rgba(139, 92, 246, 0.3));
  }
  .result-label {
    color: var(--gray-500);
    font-size: 13px;
    margin-bottom: 8px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .result-profile {
    font-family: 'Heebo', sans-serif;
    font-size: 32px;
    font-weight: 900;
    color: var(--navy-deep);
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }
  .result-tagline {
    font-size: 16px;
    color: var(--gray-500);
    max-width: 500px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .insights {
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-bottom: 32px;
  }
  .insight {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 20px;
    background: var(--cream);
    border-radius: 16px;
    border: 1px solid rgba(167, 139, 250, 0.1);
    transition: all 0.3s;
  }
  .insight:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
  }
  .insight-icon {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--purple-light) 0%, var(--purple-mid) 100%);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(139, 92, 246, 0.3);
  }
  .insight:nth-child(2) .insight-icon {
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
    box-shadow: 0 4px 12px rgba(20, 184, 166, 0.3);
  }
  .insight:nth-child(3) .insight-icon {
    background: linear-gradient(135deg, var(--navy-mid) 0%, var(--navy-light) 100%);
    box-shadow: 0 4px 12px rgba(45, 46, 122, 0.3);
  }
  .insight-content { flex: 1; }
  .insight-title { font-weight: 700; color: var(--navy-deep); margin-bottom: 4px; font-size: 15px; }
  .insight-desc { font-size: 14px; color: var(--gray-500); line-height: 1.5; }

function renderQuestion(idx) {
  const q = questions[idx];
  const progress = ((idx + 1) / questions.length) * 100;
  const selected = answers[q.key] || (q.type === "multi" ? [] : null);

  const optionsHtml = q.options.map(opt => {
    const isSelected = q.type === "multi"
      ? (Array.isArray(selected) && selected.includes(opt.value))
      : (selected === opt.value);
    return `
      <button class="option ${isSelected ? 'selected' : ''}" onclick="selectOption('${q.key}', '${opt.value}', '${q.type}')">
        <span>${opt.text}</span>
        <div class="option-check"></div>
      </button>
    `;
  }).join('');

  const canProceed = q.type === "multi" ? (Array.isArray(selected) && selected.length > 0) : !!selected;

  app.innerHTML = `
    <div class="card">
      <div class="progress-section">
        <div class="progress-info">
          <span><span class="step-num">שאלה ${idx + 1}</span> מתוך ${questions.length}</span>
          <span class="pct">${Math.round(progress)}%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width: ${progress}%"></div>
        </div>
      </div>

      <div class="question-block">
        <div class="question-icon">${q.icon}</div>
        <h2 class="question-title">${q.title}</h2>
        <p class="question-hint">${q.hint}</p>

        <div class="options">${optionsHtml}</div>

        <div class="nav-buttons">
          ${idx > 0 ? '<button class="btn-back" onclick="goToStep(currentStep - 1)">← חזרה</button>' : '<div></div>'}
          <button class="btn-next" ${canProceed ? '' : 'disabled'} onclick="nextQuestion()">
            ${idx === questions.length - 1 ? 'סיום וקבלת התוצאה' : 'הבא ←'}
          </button>
        </div>
      </div>
    </div>
  `;
}

function selectOption(key, value, type) {
  if (type === "multi") {
    if (!answers[key]) answers[key] = [];
    const idx = answers[key].indexOf(value);
    if (idx > -1) answers[key].splice(idx, 1);
    else answers[key].push(value);
  } else {
    answers[key] = value;
  }
  render();

  if (type === "single") {
    setTimeout(() => {
      if (currentStep >= 1 && currentStep <= 11) nextQuestion();
    }, 350);
  }
}

function nextQuestion() {
  if (currentStep < 11) {
    goToStep(currentStep + 1);
  } else {
    profile = calculateProfile(answers);
    goToStep(12);
  }
}

function goToStep(step) {
  currentStep = step;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
  if (step === 12) runLoadingAnimation();
}

function runLoadingAnimation() {
  const steps = ['ls0', 'ls1', 'ls2', 'ls3'];
  steps.forEach((id, i) => {
    setTimeout(() => {
      const el = document.getElementById(id);
      if (el) {
        el.classList.remove('active');
        el.classList.add('done');
        el.querySelector('.loading-step-icon').innerHTML = '✓';
      }
      if (steps[i + 1]) {
        const next = document.getElementById(steps[i + 1]);
        if (next) next.classList.add('active');
      }
    }, (i + 1) * 400);
  });
  setTimeout(() => goToStep(13), 1800);
}

// פונקציה חדשה - גלילה חלקה לטופס
function scrollToForm() {
  const formSection = document.getElementById('formSection');
  if (formSection) {
    formSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    setTimeout(() => {
      const nameInput = document.getElementById('userName');
      if (nameInput) nameInput.focus();
    }, 600);
  }
}

function renderForm() {
  // לא בשימוש יותר - הטופס מוצמד למסך התוצאה
  renderResult();
  setTimeout(scrollToForm, 100);
}

function submitForm() {
  const name = document.getElementById('userName').value.trim();
  const email = document.getElementById('userEmail').value.trim();
  const phone = document.getElementById('userPhone').value.trim();

  let valid = true;
  ['Name', 'Email', 'Phone'].forEach(f => {
    document.getElementById('err' + f).classList.remove('show');
    document.getElementById('user' + f).classList.remove('error');
  });

  if (!name || name.length < 2) {
    document.getElementById('errName').classList.add('show');
    document.getElementById('userName').classList.add('error');
    valid = false;
  }

  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    document.getElementById('errEmail').classList.add('show');
    document.getElementById('userEmail').classList.add('error');
    valid = false;
  }

  const cleanPhone = phone.replace(/[-\s]/g, '');
  if (!cleanPhone.match(/^05\d{8}$/) && !cleanPhone.match(/^0\d{8,9}$/)) {
    document.getElementById('errPhone').classList.add('show');
    document.getElementById('userPhone').classList.add('error');
    valid = false;
  }

  if (!valid) return;

  // === נתונים מלאים ששנשלחים למערכת האוטומציה ===
  const leadData = {
    // פרטי הלקוח
    name: name,
    email: email,
    phone: phone,
    // פרטי הפרופיל - האוטומציה משתמשת בזה לבחור איזה מדריך לשלוח
    profile_name: profile.name,
    profile_key: profile.profileKey,
    smoove_list_id: profile.smooveListId,
    guide_file: profile.guideFile,
    guide_title: profile.guideTitle,
    // כל התשובות לשאלון - לשימוש פנימי
    answers: JSON.stringify(answers),
    // מקור
    quiz_source: "rational_v1",
    timestamp: new Date().toISOString()
  };

  console.log("Lead captured:", leadData);

  // === שליחה ל-Webhook של Make ===
  const WEBHOOK_URL = "https://hook.eu2.make.com/c3oofpxsnt37lwatstv4rxf2s0gx4k2z";
  fetch(WEBHOOK_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(leadData)
  }).catch(err => console.error("Webhook error:", err));

  goToStep(15);
}

function showLiveNotif() {
  if (currentStep < 1 || currentStep > 13) return;

  const data = liveData[notifIndex % liveData.length];
  document.getElementById('liveName').textContent = data.name;
  document.getElementById('liveAvatar').textContent = data.initial;
  document.getElementById('liveProfile').textContent = data.profile;
  document.getElementById('liveTime').textContent = data.time;

  notifEl.classList.add('show');

}
